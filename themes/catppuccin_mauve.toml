# Catppuccin Mocha — Mauve accent
# https://github.com/catppuccin/catppuccin

[editor]
bg_main      = "#1e1e2e"
bg_dark      = "#181825"
bg_tab       = "#313244"
bg_cursor    = "#28283e"
bg_sel       = "#36294f"
bg_select    = "#443a66"
bg_match     = "#45475a"
fg           = "#cdd6f4"
